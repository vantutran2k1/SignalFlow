apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Dev overlay: single replica, smaller resources. Useful on kind where the
# control-plane node has limited CPU/memory.
patches:
  - target:
      kind: Deployment
      name: signalflow
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
