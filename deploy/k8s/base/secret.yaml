apiVersion: v1
kind: Secret
metadata:
  name: signalflow-secret
  namespace: signalflow
type: Opaque
stringData:
  # Development-only credentials. Rotate these before any non-local deploy —
  # a production setup should source them from an external secret manager
  # (sealed-secrets, external-secrets-operator, Vault, etc).
  DATABASE_URL: "postgres://signalflow:secret@signalflow-db:5432/signalflow?sslmode=disable"
  JWT_SECRET: "change-me-in-production"
