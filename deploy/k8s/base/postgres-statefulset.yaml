apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: signalflow-db
  namespace: signalflow
  labels:
    app.kubernetes.io/name: signalflow
    app.kubernetes.io/component: postgres
spec:
  serviceName: signalflow-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signalflow
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signalflow
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: signalflow-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: signalflow-postgres
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: signalflow-postgres
                  key: database
            - name: PGDATA
              # Postgres refuses to initdb into a directory that already has
              # the lost+found entry many PVCs create at the mount root, so
              # point it at a subdirectory of the mount.
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [ "pg_isready", "-U", "signalflow", "-d", "signalflow" ]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [ "pg_isready", "-U", "signalflow", "-d", "signalflow" ]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: signalflow-postgres
  namespace: signalflow
type: Opaque
stringData:
  username: "signalflow"
  password: "secret"
  database: "signalflow"
