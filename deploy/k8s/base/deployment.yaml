apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalflow
  namespace: signalflow
  labels:
    app.kubernetes.io/name: signalflow
    app.kubernetes.io/component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signalflow
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signalflow
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # Runs migrations before the app starts. Embedded in the image, so the
      # init container shares the deployment's image/tag and always applies
      # the schema version that matches the app binary it's paired with.
      # Failed attempts (e.g. DB not ready yet) are retried by kubelet.
      initContainers:
        - name: migrate
          image: signalflow:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/migrate"]
          envFrom:
            - configMapRef:
                name: signalflow-config
            - secretRef:
                name: signalflow-secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 200m
      containers:
        - name: signalflow
          image: signalflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: signalflow-config
            - secretRef:
                name: signalflow-secret
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 128Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
