services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://signalflow:secret@db:5432/signalflow?sslmode=disable
      - JWT_SECRET=dev-secret
      - LISTEN_ADDR=:8080
      - LOG_FORMAT=text
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=signalflow
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=signalflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U signalflow" ]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
