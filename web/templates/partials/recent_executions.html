{{if .}}
<table>
    <thead>
        <tr>
            <th>Job</th>
            <th>Started</th>
            <th>Status</th>
            <th>Duration</th>
        </tr>
    </thead>
    <tbody>
        {{range .}}
        <tr>
            <td><a href="/jobs/{{.JobID}}"><code>{{.JobID}}</code></a></td>
            <td>{{.StartedAt.Format "2006-01-02 15:04:05"}}</td>
            <td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
            <td>{{.DurationMs}} ms</td>
        </tr>
        {{end}}
    </tbody>
</table>
{{else}}
<p class="text-muted">No executions yet.</p>
{{end}}
