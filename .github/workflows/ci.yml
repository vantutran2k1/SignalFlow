name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install golangci-lint
        # Compile with the Go toolchain provisioned by setup-go so the linter
        # supports the Go version declared in go.mod. The golangci-lint-action
        # distributes prebuilt binaries that lag behind the newest Go releases.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: signalflow
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: signalflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        # `-p 1` serializes packages so integration tests sharing the single
        # test DB don't truncate each other's seeded rows.
        run: go test ./... -race -p 1 -coverprofile=coverage.out
        env:
          # Same database — exposed under both names so unit tests that read
          # DATABASE_URL and integration tests that read TEST_DATABASE_URL agree.
          DATABASE_URL: postgres://signalflow:secret@localhost:5432/signalflow_test?sslmode=disable
          TEST_DATABASE_URL: postgres://signalflow:secret@localhost:5432/signalflow_test?sslmode=disable
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Compile binary
        run: go build -o bin/signalflow ./cmd/signalflow
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: signalflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test image
        run: docker run --rm --entrypoint test signalflow:ci -x /usr/local/bin/signalflow
